<script>
    // Configuración inicial
    let allData = [];
    const RADIO_KM = 50; // Aumentado a 50km para pruebas desde Utrera

    // 1. Carga del archivo JSON local (asegúrate de que esté en la misma carpeta)
    fetch('hotspots.json')
        .then(response => {
            if (!response.ok) throw new Error("No se pudo cargar hotspots.json");
            return response.json();
        })
        .then(data => {
            allData = data;
            console.log("Datos cargados correctamente:", allData.length, "puntos");
        })
        .catch(err => {
            console.error("Error de carga:", err);
            document.getElementById('estado').textContent = "Error: hotspots.json no encontrado";
        });

    // 2. Función Haversine para calcular distancia
    function getDistanciaKm(lat1, lon1, lat2, lon2) {
        const R = 6371; // Radio de la Tierra en km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + 
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // 3. Inicio del monitoreo GPS
    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(
            (pos) => {
                const { latitude, longitude } = pos.coords;
                if (allData.length === 0) return;

                // Calcular distancias y filtrar
                const cercanos = allData.map(h => ({
                    ...h,
                    dist: getDistanciaKm(latitude, longitude, h.lat, h.lng)
                })).filter(h => h.dist <= RADIO_KM).sort((a, b) => a.dist - b.dist);

                actualizarUI(cercanos);
            },
            (err) => {
                console.error("Error de ubicación:", err);
                document.getElementById('estado').textContent = "Permiso de ubicación denegado";
            },
            { enableHighAccuracy: true }
        );
    } else {
        document.getElementById('estado').textContent = "Geolocalización no soportada";
    }

    // 4. Actualización de la interfaz
    function actualizarUI(cercanos) {
        const radar = document.getElementById('radar');
        const estado = document.getElementById('estado');
        const lista = document.getElementById('lista-spots');

        if (cercanos.length > 0) {
            radar.classList.add('alerta');
            estado.textContent = `${cercanos.length} DETECTADOS`;
            lista.innerHTML = cercanos.map(h => `
                <div class="spot-card">
                    <strong>${h.name}</strong><br>
                    <small>A ${h.dist.toFixed(1)} km de distancia</small>
                </div>
            `).join('');
        } else {
            radar.classList.remove('alerta');
            estado.textContent = "ZONA SEGURA";
            lista.innerHTML = "";
        }
    }
</script>
