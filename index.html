<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Paranormal Pro</title>
    <style>
        :root { --bg: #050506; --rojo: #b10018; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        #radar {
            width: 220px; height: 220px; border: 4px solid #333; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.5s ease; position: relative; margin: 30px 0;
        }
        .alerta { animation: pulse 0.6s infinite; border-color: var(--rojo) !important; box-shadow: 0 0 40px var(--rojo); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } }
        
        #lista-spots { width: 100%; max-width: 450px; }
        .spot-card { background: #111; padding: 15px; margin-bottom: 12px; border-radius: 10px; border-left: 5px solid var(--rojo); cursor: pointer; transition: 0.3s; }
        .spot-card:hover { background: #1a1a1a; }
        h1 { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h1>Radar de Energía</h1>
    <div id="radar"><span id="estado">Iniciando...</span></div>
    <div id="lista-spots"></div>

    <script>
        let allData = [];
        const RADIO_KM = 100; // Ajustable según necesites

        // 1. Cargar JSON local
        fetch('hotspots.json')
            .then(r => r.json())
            .then(data => { allData = data; })
            .catch(e => document.getElementById('estado').textContent = "Error: JSON no encontrado");

        // 2. Cálculo de distancia (Haversine)
        function getDistanciaKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // 3. Monitoreo GPS
        navigator.geolocation.watchPosition((pos) => {
            if(allData.length === 0) return;
            const { latitude, longitude } = pos.coords;
            const cercanos = allData.map(h => ({
                ...h,
                dist: getDistanciaKm(latitude, longitude, h.lat, h.lng)
            })).filter(h => h.dist <= RADIO_KM).sort((a, b) => a.dist - b.dist);

            actualizarUI(cercanos);
        }, () => document.getElementById('estado').textContent = "GPS Denegado", {enableHighAccuracy: true});

        // 4. Actualización de Interfaz
        function actualizarUI(cercanos) {
            const radar = document.getElementById('radar');
            const estado = document.getElementById('estado');
            const lista = document.getElementById('lista-spots');

            if(cercanos.length > 0) {
                radar.classList.add('alerta');
                estado.textContent = `${cercanos.length} DETECTADOS`;
                lista.innerHTML = cercanos.map(h => `
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lng}" 
                       target="_blank" style="text-decoration:none; color:inherit;">
                        <div class="spot-card">
                            <strong>${h.name}</strong><br>
                            <small>Distancia: ${h.dist.toFixed(1)} km</small><br>
                            <small style="color:var(--rojo)">📍 Abrir navegación</small>
                        </div>
                    </a>
                `).join('');
            } else {
                radar.classList.remove('alerta');
                estado.textContent = "ZONA SEGURA";
                lista.innerHTML = "";
            }
        }
    </script>
</body>
</html>
