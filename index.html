<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Debug Radar</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        #estado { color: yellow; border: 1px solid yellow; padding: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Estado del Radar</h1>
    <div id="estado">Iniciando...</div>
    <div id="radar" style="width:100px; height:100px; border:2px solid red;"></div>
    <div id="lista-spots"></div>

    <script>
        // 1. Verificación de carga
        const estadoDiv = document.getElementById('estado');
        console.log("El script ha comenzado");
        estadoDiv.textContent = "Script iniciado...";

        fetch('hotspots.json')
            .then(r => {
                if (!r.ok) throw new Error("Archivo hotspots.json no encontrado (404)");
                return r.json();
            })
            .then(data => {
                estadoDiv.textContent = "JSON cargado con " + data.length + " puntos.";
                console.log("Datos:", data);
            })
            .catch(e => {
                estadoDiv.textContent = "ERROR: " + e.message;
                alert("Error al cargar JSON: " + e.message);
            });

        // 2. Verificación de Geolocalización
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                (pos) => { estadoDiv.textContent += " | GPS detectado!"; },
                (err) => { estadoDiv.textContent += " | ERROR GPS: " + err.message; }
            );
        } else {
            estadoDiv.textContent += " | GPS no soportado.";
        }
    </script>
</body>
</html>
